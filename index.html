<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Statement to Excel Converter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:        #10243D;   /* deep navy-black — headings, primary text */
    --ink-soft:   #4B5C6B;   /* secondary text */
    --paper:      #EEF2F0;   /* cool paper background (not cream) */
    --card:       #FFFFFF;
    --rule:       #D9E0DC;   /* ledger ruling lines / borders */
    --ledger:     #146356;   /* deep teal-green — primary accent */
    --ledger-2:   #1C8571;   /* lighter teal for gradients */
    --ledger-dim: #E4EFEC;
    --amber:      #9C6B12;
    --amber-bg:   #FBF2E2;
    --brick:      #9B3226;
    --brick-bg:   #FBECEA;
  }

  * { box-sizing: border-box; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  html { background: var(--paper); }

  /* thin multi-stop accent line across the very top of the viewport */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--ledger) 0%, var(--ledger-2) 45%, var(--ink) 100%);
    z-index: 10;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--paper);
    background-image: linear-gradient(var(--rule) 1px, transparent 1px);
    background-size: 100% 34px;
    background-position: 0 168px;
    color: var(--ink);
    min-height: 100vh;
    margin: 0;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow-x: hidden;
  }

  /* soft ambient glow behind the card, for depth */
  body::after {
    content: "";
    position: absolute;
    top: 160px; left: 50%;
    width: 900px; height: 620px;
    transform: translateX(-50%);
    background: radial-gradient(closest-side, rgba(20,99,86,0.10), rgba(20,99,86,0) 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 640px;
    margin: 0 auto;
    padding: 0 20px 90px;
  }

  /* ---------- masthead ---------- */
  .masthead {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 22px 0 18px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 44px;
  }
  .monogram {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(155deg, var(--ledger-2), var(--ledger) 65%, var(--ink));
    color: #fff;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 14.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.01em;
    flex-shrink: 0;
    box-shadow: 0 4px 10px -4px rgba(16,36,61,0.45);
  }
  .masthead-text { line-height: 1.25; }
  .masthead-name {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 16.5px;
    color: var(--ink);
  }
  .masthead-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ledger);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    animation: rise .5s ease both;
  }
  .eyebrow::before {
    content: "";
    width: 18px; height: 2px;
    background: var(--ledger);
    display: inline-block;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 36px;
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin: 0 0 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: rise .55s ease .05s both;
  }
  h1 em {
    font-style: italic;
    font-weight: 500;
    color: var(--ledger);
  }
  h1 svg { flex-shrink: 0; }

  p.sub {
    color: var(--ink-soft);
    margin: 0 0 32px;
    font-size: 15px;
    line-height: 1.55;
    max-width: 46ch;
    animation: rise .55s ease .1s both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card {
    position: relative;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 40px 32px;
    box-shadow: 0 1px 2px rgba(16,36,61,0.05), 0 18px 40px -22px rgba(16,36,61,0.35);
    transition: box-shadow .25s ease, transform .25s ease;
    animation: rise .6s ease .15s both;
  }
  .card:hover {
    box-shadow: 0 1px 2px rgba(16,36,61,0.06), 0 24px 48px -20px rgba(16,36,61,0.4);
    transform: translateY(-2px);
  }
  .card::before {
    content: "";
    position: absolute;
    top: -1px; left: 28px;
    width: 46px; height: 6px;
    background: linear-gradient(90deg, var(--ledger), var(--ledger-2));
    border-radius: 0 0 3px 3px;
  }

  .box {
    border: 1.5px dashed #BFC9C5;
    border-radius: 5px;
    padding: 34px 20px 30px;
    text-align: center;
    background:
      radial-gradient(circle at 50% 0%, rgba(20,99,86,0.05), transparent 60%),
      var(--paper);
    transition: border-color .2s ease, background .2s ease;
  }
  .box:has(input:focus-visible) {
    border-color: var(--ledger);
  }

  .box-icon {
    margin-bottom: 14px;
    color: var(--ledger);
    opacity: 0.85;
  }

  .file-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }

  input[type=file] {
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    color: var(--ink-soft);
  }
  input[type=file]::file-selector-button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    background: #fff;
    color: var(--ink);
    border: 1px solid var(--ink);
    border-radius: 3px;
    padding: 7px 14px;
    margin-right: 10px;
    cursor: pointer;
    transition: background .15s ease, color .15s ease;
  }
  input[type=file]::file-selector-button:hover {
    background: var(--ink);
    color: #fff;
  }

  button[type=submit] {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--ledger-2), var(--ledger));
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 4px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 9px;
    box-shadow: 0 8px 18px -8px rgba(20,99,86,0.55);
    transition: box-shadow .15s ease, transform .1s ease, background .15s ease;
  }
  button[type=submit]:hover:not(:disabled) {
    box-shadow: 0 10px 22px -8px rgba(20,99,86,0.65);
  }
  button[type=submit]:active:not(:disabled) { transform: translateY(1px); }
  button[type=submit]:disabled {
    background: #AEB8B4;
    box-shadow: none;
    cursor: not-allowed;
  }
  button:focus-visible, input:focus-visible, a:focus-visible {
    outline: 2px solid var(--ledger);
    outline-offset: 2px;
  }

  .progress-wrap { margin-top: 28px; display: none; }
  .bar-bg {
    position: relative;
    background: var(--ledger-dim);
    border-radius: 3px;
    height: 10px;
    overflow: hidden;
    background-image: repeating-linear-gradient(
      to right, transparent 0, transparent calc(10% - 1px), var(--paper) calc(10% - 1px), var(--paper) 10%
    );
  }
  .bar-fill {
    position: relative;
    background: linear-gradient(90deg, var(--ledger), var(--ledger-2));
    height: 100%;
    width: 0%;
    transition: width .3s ease;
    overflow: hidden;
  }
  .bar-fill::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
    background-size: 200% 100%;
    animation: shimmer 1.4s linear infinite;
  }
  @keyframes shimmer {
    from { background-position: 140% 0; }
    to   { background-position: -40% 0; }
  }
  .msg {
    margin-top: 11px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
  }

  .result {
    margin-top: 26px;
    position: relative;
    padding: 22px 22px 20px;
    border-radius: 4px;
    display: none;
    overflow: visible;
    animation: pop .35s cubic-bezier(.2,.8,.3,1) both;
  }
  @keyframes pop {
    from { opacity: 0; transform: translateY(6px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .result::before {
    content: "";
    position: absolute;
    top: -6px; left: 14px; right: 14px;
    height: 12px;
    background-image: radial-gradient(circle, var(--paper) 3.2px, transparent 3.2px);
    background-size: 16px 12px;
    background-repeat: repeat-x;
    background-position: 0 -1px;
  }
  .result.ok   { background: var(--ledger-dim); border: 1px solid #BFDAD2; }
  .result.warn { background: var(--amber-bg);   border: 1px solid #E9CFA0; }
  .result.err  { background: var(--brick-bg);   border: 1px solid #E3B7B1; }

  .result strong {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 17px;
    display: block;
    margin-bottom: 10px;
    color: var(--ink);
  }

  .stat {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    color: var(--ink-soft);
    padding: 5px 0;
    border-bottom: 1px dashed var(--rule);
  }
  .stat:last-of-type { border-bottom: none; }

  a.download-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: var(--ink);
    color: #fff;
    padding: 10px 20px;
    border-radius: 4px;
    text-decoration: none;
    box-shadow: 0 8px 18px -10px rgba(16,36,61,0.55);
    transition: background .15s ease, transform .1s ease;
  }
  a.download-btn:hover { background: var(--ledger); }
  a.download-btn:active { transform: translateY(1px); }

  .trust-strip {
    display: flex;
    gap: 22px;
    flex-wrap: wrap;
    margin-top: 30px;
    padding-top: 18px;
    border-top: 1px solid var(--rule);
  }
  .trust-strip span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .trust-strip span::before {
    content: "";
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--ledger);
    display: inline-block;
  }

  footer.credit {
    text-align: center;
    margin-top: 36px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #94A0A9;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <div class="monogram">NY</div>
    <div class="masthead-text">
      <div class="masthead-name">Naresh Yadav</div>
      <div class="masthead-tag">Financial Document Tools</div>
    </div>
  </div>

  <div class="eyebrow">PDF → Spreadsheet</div>
  <h1>
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 2.5H14.5L19 7V21.5H6V2.5Z" stroke="#146356" stroke-width="1.4" stroke-linejoin="round"/>
      <path d="M14.5 2.5V7H19" stroke="#146356" stroke-width="1.4" stroke-linejoin="round"/>
      <path d="M8.5 11.5H16.5M8.5 14.5H16.5M8.5 17.5H13" stroke="#146356" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    Bank Statement <em>→</em> Excel
  </h1>
  <p class="sub">Upload a PDF statement from any bank. Columns are detected automatically and every row is checked against the running balance.</p>

  <div class="card">
    <div class="box">
      <svg class="box-icon" width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 15V3M12 3L7.5 7.5M12 3L16.5 7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 15V18C4 19.1046 4.89543 20 6 20H18C19.1046 20 20 19.1046 20 18V15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <form id="uploadForm">
        <div class="file-row">
          <input type="file" id="fileInput" accept="application/pdf" required>
        </div>
        <button type="submit" id="submitBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 12H20M20 12L14 6M20 12L14 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Convert to Excel
        </button>
      </form>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="bar-bg"><div class="bar-fill" id="barFill"></div></div>
      <div class="msg" id="msg">Starting…</div>
    </div>

    <div class="result" id="result"></div>

    <div class="trust-strip">
      <span>Any bank</span>
      <span>Balance-checked</span>
      <span>No merged cells</span>
    </div>
  </div>

  <footer class="credit">Built by Naresh Yadav</footer>

</div>

<script>
const form = document.getElementById('uploadForm');
const submitBtn = document.getElementById('submitBtn');
const progressWrap = document.getElementById('progressWrap');
const barFill = document.getElementById('barFill');
const msg = document.getElementById('msg');
const resultBox = document.getElementById('result');

let pollTimer = null;

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const file = document.getElementById('fileInput').files[0];
  if (!file) return;

  resultBox.style.display = 'none';
  resultBox.className = 'result';
  submitBtn.disabled = true;
  progressWrap.style.display = 'block';
  barFill.style.width = '2%';
  msg.textContent = 'Uploading…';

  const formData = new FormData();
  formData.append('statement', file);

  try {
    const res = await fetch('upload.php', { method: 'POST', body: formData });
    const data = await res.json();
    if (!data.ok) {
      showError(data.error || 'Upload failed.');
      return;
    }
    pollStatus(data.job_id);
  } catch (err) {
    showError('Could not reach the server. Please try again.');
  }
});

function pollStatus(jobId) {
  // Polling means the browser never holds one long HTTP request open,
  // so there's nothing for a server or proxy timeout to interrupt —
  // even a 174-page statement just shows a progress bar that keeps
  // updating.
  pollTimer = setInterval(async () => {
    try {
      const res = await fetch('status.php?job_id=' + encodeURIComponent(jobId));
      const data = await res.json();
      if (!data.ok) {
        clearInterval(pollTimer);
        showError(data.error || 'Something went wrong.');
        return;
      }

      const pct = data.progress ?? 0;
      barFill.style.width = pct + '%';
      msg.textContent = data.message || 'Processing…';

      if (data.status === 'completed' || data.status === 'completed_with_warnings') {
    clearInterval(pollTimer);
    alert("Completed!");
    showSuccess(jobId, data);
      } else if (data.status === 'failed') {
        clearInterval(pollTimer);
        showError(data.error || 'Conversion failed.');
      }
    } catch (err) {
      // transient network hiccup — keep polling
    }
  }, 1500);
}

function fmt(n) {
  if (n === null || n === undefined) return '—';
  return Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function showSuccess(jobId, data) {
  submitBtn.disabled = false;
  progressWrap.style.display = 'none';
  const warn = data.status === 'completed_with_warnings';
  resultBox.className = 'result ' + (warn ? 'warn' : 'ok');
  resultBox.style.display = 'block';
  resultBox.innerHTML = `
    <div><strong>${warn ? '⚠️ Converted with some rows flagged' : '✅ Converted successfully'}</strong></div>
    <div class="stat">Bank: ${data.bank_name || 'Auto-detected'}</div>
    <div class="stat">Transactions: ${data.transactions_count ?? '—'}</div>
    <div class="stat">Total withdrawals: ₹${fmt(data.total_withdrawals)}</div>
    <div class="stat">Total deposits: ₹${fmt(data.total_deposits)}</div>
    <div class="stat">Closing balance: ₹${fmt(data.closing_balance)}</div>
    ${data.audit_flags_count !== undefined && data.audit_flags_count !== null ? `<div class="stat">Audit flags identified: ${data.audit_flags_count}</div>` : ''}
    ${warn ? `<div class="stat">Rows needing a manual check: ${data.balance_mismatches}</div>` : ''}
    <a class="download-btn" href="download.php?job_id=${jobId}">Download Excel file</a>
    <a class="download-btn" href="download.php?job_id=${jobId}&type=analysis" target="_blank" rel="noopener" style="background:var(--ledger); margin-left:8px;">View Audit / ITR Analysis</a>
  `;
}

function showError(text) {
  submitBtn.disabled = false;
  progressWrap.style.display = 'none';
  resultBox.className = 'result err';
  resultBox.style.display = 'block';
  resultBox.innerHTML = `<strong>Conversion failed</strong><div class="stat">${text}</div>`;
}
</script>

</body>
</html>
